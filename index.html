<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>KinkForm</title>
	<link rel="stylesheet" href="css/index.css">
</head>
<body>
	<div id="home-page">
	  <h1 class="app-title">KinkForm</h1>
	  <div class="menu-buttons">
	    <button id="default-btn">默认自测表</button>
	    <button id="custom-btn">载入自定义表</button>
        <button id="my-shares-btn" style="background: linear-gradient(135deg, #1abc9c, #16a085);">我的分享记录</button>
	    <button id="help-btn">帮助须知</button>
	  </div>
	  
	  <!-- 自定义表输入弹窗 -->
	  <div id="custom-modal" style="display: none;">
	    <div class="modal-content">
	      <h3>粘贴你的自测表脚本</h3>
	      <textarea id="custom-textarea" placeholder="格式示例：&#10;#分类名称&#10;-项目1 | 🎯&#10;-项目2 | 🌟"></textarea>
	      
	      <div id="share-link-container" style="display: none; margin-bottom: 15px; text-align: left;">
	        <p style="margin: 0 0 5px; font-size: 14px; color: #5a2a41;">分享链接 (点击复制):</p>
	        <input type="text" id="share-link-input" readonly style="width: 100%; padding: 8px; border: 1px solid #f8c8d0; border-radius: 5px; box-sizing: border-box; cursor: pointer; color: #ec4d7a; background: #fff5f7;">
	      </div>

	      <div class="modal-buttons" style="flex-wrap: wrap;">
	        <button id="generate-share-btn" style="background-color: #f39c12; flex-basis: 100%; margin-bottom: 10px;">生成分享链接</button>
	        <button id="confirm-btn">确定</button>
	        <button id="cancel-btn">取消</button>
	      </div>
	    </div>
	  </div>

	  <!-- 我的分享记录弹窗 -->
	  <div id="my-shares-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
	    <div class="modal-content" style="max-height: 80vh; overflow-y: auto; text-align: left;">
	      <h3 style="text-align: center; margin-top: 0;">我的分享记录</h3>
	      <div id="shares-list"></div>
	      <div class="modal-buttons" style="margin-top: 20px;">
	        <button id="close-shares-btn">关闭</button>
	      </div>
	    </div>
	  </div>

	  <!-- 加载遮罩 -->
	  <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
	    <div class="spinner" style="border: 4px solid #f8c8d0; border-top: 4px solid #ec4d7a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
	    <p id="loading-text" style="color: #ec4d7a; margin-top: 15px; font-weight: bold;">加载中...</p>
	  </div>
	</div>
	
	
	<div id="app">
		<div id="main-page">
			<h2 id="category-title"></h2>
			<div id="item-list" class="item-list"></div>
			<div class="controls">
				<!-- <button id="prev-btn">← 上一页</button>
				<button id="next-btn">下一页 →</button> -->
			</div>
			<div id="submit-btn-container" style="display: none;">
				<button id="submit-btn">提交</button>
			</div>
		</div>
	
		<div id="result-page" style="display: none;"></div>
	</div>



	<script src="js/index.js"></script>
	<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
